name: wach_flutter
description: "W.A.C.H. - Workout Awareness & Continuous Health"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Local Database
  sembast: ^3.7.3
  sembast_web: ^2.3.0

  # Navigation
  go_router: ^14.6.0

  # Utilities
  path_provider: ^2.1.5
  intl: ^0.20.2
  uuid: ^4.5.1

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  # Google Drive Sync
  google_sign_in: ^6.2.2
  googleapis: ^13.2.0
  extension_google_sign_in_as_googleapis_auth: ^2.0.12
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
